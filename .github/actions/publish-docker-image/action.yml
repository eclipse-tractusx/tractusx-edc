---
name: "Publish Docker Image"
description: "Build and publish a Docker Image to DockerHub"
inputs:
  rootDir:
    required: true
    description: "The directory where the notice.md file and the src/main/docker directory are located"
  namespace:
    required: false
    default: "tractusx"
    description: "The Docker image namespace"
  imagename:
    required: true
    description: "the name of the image"
  docker_user:
    required: false
    description: "DockerHub user name. No push is done if omitted"
  docker_token:
    required: false
    description: "DockerHub Token. No push is done if omitted"
  docker_tag:
    required: false
    description: 'additional docker tags'

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    ###############################################
    # Enable emulation for cross-arch builds
    ###############################################
    - name: Set up QEMU
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    ###############################################
    # Use Docker Buildx (required for multi-arch)
    ###############################################
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    #####################
    # Login to DockerHub
    #####################
    - name: DockerHub login
      uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
      with:
        username: ${{ inputs.docker_user }}
        password: ${{ inputs.docker_token }}

    #####################
    # Build JAR file
    #####################
    - uses: ./.github/actions/setup-java
    - name: Build Controlplane
      shell: bash
      env:
        ROOT_DIR: ${{ inputs.rootDir }}
      run: |-
        ./gradlew -p "$ROOT_DIR" shadowJar

    ###############################
    # Set metadata of docker image
    ###############################
    # Create SemVer or ref tags dependent of trigger event
    - name: Docker meta
      id: meta
      uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
      with:
        images: |
          ${{ inputs.namespace }}/${{ inputs.imagename }}
        tags: |
          type=semver,pattern={{version}},value=${{ inputs.docker_tag }}
          type=semver,pattern={{major}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{raw}}
          type=match,pattern=\d.\d.\d
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha

    ###############################
    # Build and push the image
    ###############################
    - name: Build and push
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      env:
        ROOT_DIR: ${{ inputs.rootDir }}
        IMAGE_NAME: ${{ inputs.imagename }}
      with:
        context: ${{ env.ROOT_DIR }}
        file: ${{ env.ROOT_DIR }}/build/resources/docker/Dockerfile
        build-args: |
          JAR=build/libs/${{ env.IMAGE_NAME }}.jar
          OTEL_JAR=build/resources/otel/opentelemetry-javaagent.jar
          ADDITIONAL_FILES=build/legal/*
        push: true
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    ###############################
    # Update the description
    ###############################
    - name: Update Docker Hub description
      shell: bash
      env:
        DOCKER_USER: ${{ inputs.docker_user }}
        DOCKER_TOKEN: ${{ inputs.docker_token }}
        NAMESPACE: ${{ inputs.namespace }}
        IMAGENAME: ${{ inputs.imagename }}
        README_FILEPATH: ${{ inputs.rootDir }}/notice.md
      run: |
        # Obtain a DockerHub JWT
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://hub.docker.com/v2/users/login" \
          -H "Content-Type: application/json" \
          -d "{\"username\": \"$DOCKER_USER\", \"password\": \"$DOCKER_TOKEN\"}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
        BODY=$(echo "$RESPONSE" | head -n-1)

        if [ "$HTTP_CODE" != "200" ]; then
          echo "DockerHub login failed with HTTP $HTTP_CODE: $BODY"
          exit 1
        fi

        TOKEN=$(echo "$BODY" | jq -r '.token')

        if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
          echo "Failed to extract token from DockerHub login response"
          exit 1
        fi

        # Patch the full_description field using jq to safely build the JSON payload
        PAYLOAD=$(jq -n --rawfile desc "$README_FILEPATH" '{"full_description": $desc}')

        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
          "https://hub.docker.com/v2/repositories/$NAMESPACE/$IMAGENAME/" \
          -H "Authorization: Bearer $TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        if [ "$HTTP_CODE" != "200" ]; then
          echo "Failed to update Docker Hub description, HTTP $HTTP_CODE"
          exit 1
        fi

        echo "Docker Hub description updated successfully"
