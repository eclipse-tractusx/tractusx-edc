name: "Update version and charts"
description: "Update version and charts"
inputs:
  version:
    description: 'The release version'
    required: true
  bump_version:
    description: 'Should version be bumped'
    required: true
runs:
  using: "composite"
  steps:
    - name: Resolve version
      id: resolver
      shell: bash
      env:
        BUMP_VERSION: ${{ inputs.bump_version }}
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        if [[ "$BUMP_VERSION" == "true" ]] then
          IFS=.- read -r MAJOR MINOR PATCH SNAPSHOT<<<"$INPUT_VERSION"
          VERSION="$MAJOR.$((MINOR+1)).0-SNAPSHOT"
        else
          VERSION="$INPUT_VERSION"
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
    - name: Bump version in /charts
      uses: mikefarah/yq@5a7e72a743649b1b3a47d1a1d8214f3453173c51 # v4.52.4
      env:
        RESOLVED_VERSION: ${{ steps.resolver.outputs.version }}
      with:
        cmd: |
          find charts -name Chart.yaml -maxdepth 3 | xargs -n1 yq -i '.appVersion = env(RESOLVED_VERSION) | .version = env(RESOLVED_VERSION)'
    - name: Update Chart READMEs
      shell: bash
      run: |
          docker run -v "${GITHUB_WORKSPACE}/charts:/helm-docs" jnorwood/helm-docs helm-docs
    - name: Update version in gradle.properties
      shell: bash
      env:
        RESOLVED_VERSION: ${{ steps.resolver.outputs.version }}
      run: |-
        sed -i 's/version=.*/version='"$RESOLVED_VERSION"'/g' gradle.properties
    - name: Commit changes
      id: make-commit
      shell: bash
      env:
        BUMP_VERSION: ${{ inputs.bump_version }}
        INPUT_VERSION: ${{ inputs.version }}
        RESOLVED_VERSION: ${{ steps.resolver.outputs.version }}
      run: |
        if [[ "$BUMP_VERSION" == "true" ]] then
          MESSAGE="Bump to version $RESOLVED_VERSION"
        else
          MESSAGE="Prepare release $INPUT_VERSION"
        fi
        
        git add .
        git config user.name "eclipse-tractusx-bot"
        git config user.email "tractusx-bot@eclipse.org"
        git commit --message "$MESSAGE"
        echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
