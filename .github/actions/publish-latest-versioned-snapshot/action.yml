---
name: "publish-latest-versioned-snapshot"
description: "publish the latest versioned snapshot file to GitHub Pages"
inputs:
  version:
    required: true
    description: "Version of latest DATED Snapshot"
runs:
  using: composite
  steps:
    - name: Write version to latest-versioned-snapshot file
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        mkdir -p lvs
        echo "$VERSION" > lvs/latest-versioned-snapshot.txt

    - name: Deploy to GitHub Pages
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        VERSION: ${{ inputs.version }}
      run: |
        git config user.name "eclipse-tractusx-bot"
        git config user.email "tractusx-bot@eclipse.org"
        git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

        # Save the file content before switching branches
        SNAPSHOT_VERSION=$(cat lvs/latest-versioned-snapshot.txt)

        # Fetch gh-pages branch
        if git fetch origin gh-pages --depth=1 2>/dev/null; then
          git checkout -b gh-pages origin/gh-pages
        else
          # gh-pages branch doesn't exist yet - create orphan branch
          git checkout --orphan gh-pages
          git rm -rf . --quiet
        fi

        # Write the file into the misc directory
        mkdir -p misc
        echo "$SNAPSHOT_VERSION" > misc/latest-versioned-snapshot.txt

        git add misc/latest-versioned-snapshot.txt
        if git diff --staged --quiet; then
          echo "No changes to publish."
          exit 0
        fi

        git commit -m "Update latest-versioned-snapshot to $VERSION"
        git push origin gh-pages
