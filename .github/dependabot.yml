---
version: 2
updates:

  # Gradle
  -
    package-ecosystem: "gradle"
    target-branch: main
    directory: /
    labels:
      - "dependabot"
      - "dependencies"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "org.eclipse.dataspacetck.dsp:*"
      - dependency-name: "org.eclipse.dataspacetck.dcp:*"
    groups:
      edc-core-and-spi:
        patterns:
          - "org.eclipse.edc*"
          - "org.eclipse.tractusx*"
          - "org.eclipse.dataspace*"
      test-dependencies:
        patterns:
          - "org.junit*"
          - "org.mockito*"
          - "org.testcontainers*"
          - "org.awaitility*"
          - "org.assertj*"
      build-tooling:
        patterns:
          - "com.diffplug.spotless*"
          - "org.sonarqube*"
          - "com.github.ben-manes*"
          - "org.jreleaser*"
      logging:
        patterns:
          - "org.apache.logging.log4j*"
          - "ch.qos.logback*"
          - "org.slf4j*"

  # Github Actions
  -
    package-ecosystem: "github-actions"
    target-branch: main
    directories:
      - "/"                         # scan workflows
      - "/.github/actions/*"        # scan all composite actions’ action.yml
    labels:
      - "dependabot"
      - "github-actions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 7
    groups:
      github-actions-all:
        patterns:
          - "*"

  # Docker
  - package-ecosystem: "docker"
    target-branch: main
    directories:
      - "resources"
      - "edc-extensions/bdrs-client/src/test/resources"
      - "edc-tests/e2e-fixtures/src/testFixtures/resources"
    labels:
      - "dependabot"
      - "docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 50
    cooldown:
      default-days: 7
    groups:
      docker-base-images:
        patterns:
          - "*"
