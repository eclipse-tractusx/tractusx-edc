---
name: "Create and publish Docker images"

on:
  workflow_dispatch:
    inputs:
      namespace:
        description: 'The namespace (=repo) in DockerHub'
        required: false
        default: "tractusx"
      docker_tag:
        description: 'Explicitly specify the Docker tag. Note that SHA and latest are added automatically.'
        required: false
        type: string

  workflow_call:
    inputs:
      namespace:
        type: string
        description: 'The namespace (=repo) in DockerHub'
        required: false
        default: "tractusx"
      docker_tag:
        type: string
        description: 'Explicitly specify the Docker tag. Note that SHA and latest are added automatically.'
        required: false

permissions:
  contents: read

jobs:
  create-docker-image:
    name: "Build and push images"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [ { dir: edc-controlplane, img: edc-runtime-memory },
                   { dir: edc-controlplane, img: edc-controlplane-postgresql-hashicorp-vault },
                   { dir: edc-dataplane,    img: edc-dataplane-hashicorp-vault },
                   { dir: edc-tests/runtime, img: mock-connector }]
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Log inputs
        env:
          INPUT_DOCKER_TAG: ${{ inputs.docker_tag }}
          INPUT_NAMESPACE: ${{ inputs.namespace }}
        run: |
          echo "Input Version: $INPUT_DOCKER_TAG, Input namespace: $INPUT_NAMESPACE"
      - uses: ./.github/actions/publish-docker-image
        name: Publish ${{ matrix.variant.img }}
        with:
          docker_tag: ${{ inputs.docker_tag }}
          rootDir: ${{ matrix.variant.dir }}/${{ matrix.variant.img }}
          imagename: ${{ matrix.variant.img }}
          namespace: ${{ inputs.namespace }}
          docker_user: ${{ secrets.DOCKER_HUB_USER }}
          docker_token: ${{ secrets.DOCKER_HUB_TOKEN }}
