name: "Secrets scan (TruffleHog)"

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    - cron: "0 0 * * *" # Once a day

permissions:
  contents: read

jobs:
  ScanSecrets:
    name: Scan secrets
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write
      issues: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout Repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0  # Ensure full clone for pull request workflows
          persist-credentials: false

      - name: TruffleHog OSS
        id: trufflehog
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55
        continue-on-error: true
        with:
          path: ./  # Scan the entire repository
          base: "${{ github.event.repository.default_branch }}"  # Set base branch for comparison (pull requests)
          extra_args: --filter-entropy=4 --results=verified,unknown --debug

      - name: Scan Results Status
        if: steps.trufflehog.outcome == 'failure'
        run: exit 1  # Set workflow run to failure if TruffleHog finds secrets
