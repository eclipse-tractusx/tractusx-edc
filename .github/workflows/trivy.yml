---
name: "Trivy"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  git-sha7:
    name: Determine short git sha
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.git-sha7.outputs.SHA7 }}
    steps:
      - name: Resolve git 7-chars sha
        id: git-sha7
        run: |
          echo "SHA7=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

  trivy-analyze-config:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: eclipse-tractusx/sig-infra/.github/workflows/reusable-trivy.yaml@main
    with:
      scan-type: "config"
      output-file: "trivy-results-config.sarif"

  trivy-edc-runtime-memory:
    needs: [ git-sha7 ]
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: eclipse-tractusx/sig-infra/.github/workflows/reusable-trivy.yaml@main
    with:
      scan-type: "image"
      image-ref: "tractusx/edc-runtime-memory:sha-${{ needs.git-sha7.outputs.value }}"
      output-file: "trivy-results-edc-runtime-memory.sarif"

  trivy-edc-controlplane:
    needs: [ git-sha7 ]
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: eclipse-tractusx/sig-infra/.github/workflows/reusable-trivy.yaml@main
    with:
      scan-type: "image"
      image-ref: "tractusx/edc-controlplane-postgresql-hashicorp-vault:sha-${{ needs.git-sha7.outputs.value }}"
      output-file: "trivy-results-edc-controlplane-postgresql-hashicorp-vault.sarif"

  trivy-edc-dataplane:
    needs: [ git-sha7 ]
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: eclipse-tractusx/sig-infra/.github/workflows/reusable-trivy.yaml@main
    with:
      scan-type: "image"
      image-ref: "tractusx/edc-dataplane-hashicorp-vault:sha-${{ needs.git-sha7.outputs.value }}"
      output-file: "trivy-results-edc-dataplane-hashicorp-vault.sarif"
