---
name: "Publish Maven Artefacts to Maven Central"

on:
  workflow_dispatch:
    inputs:
      version:
        required: false
        description: 'a semver string denoting the version. Append -SNAPSHOT for snapshots. If omitted, the version is taken from gradle.properties'
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        description: 'a semver string denoting the version. Append -SNAPSHOT for snapshots. If omitted, the version is taken from gradle.properties'

permissions:
  contents: read

jobs:
  maven-release:
    name: 'Publish all artefacts to MavenCentral'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-java

      - name: Set version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          echo "Input Version: $INPUT_VERSION"

          # set the input version in gradle.properties, if passed
          if [ ! -z "$INPUT_VERSION" ];
          then
            sed -i 's#^version=.*#version='"$INPUT_VERSION"'#g' $(find . -name "gradle.properties")
          fi

          grep version gradle.properties | (echo -n "Publishing using " && cat)

      - uses: ./.github/actions/publish-maven-artifacts
        with:
          gpg-private-key: ${{ secrets.ORG_GPG_PRIVATE_KEY }}
          gpg-passphrase: ${{ secrets.ORG_GPG_PASSPHRASE }}
          username: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
          password: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}
