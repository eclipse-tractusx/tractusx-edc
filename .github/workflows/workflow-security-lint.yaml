---
name: "Workflow Security Lint"

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    - cron: "0 0 * * 1" # every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: "zizmor"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to GitHub Advanced Security
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@a16621b09c6db4281f81a93cb393b05dcd7b7165 # v0.5.5
        with:
          version: "1.23.1"
          advanced-security: "true"
          token: ${{ secrets.GITHUB_TOKEN }}
          config: .github/zizmor.yml

  poutine:
    name: "poutine"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to GitHub Advanced Security
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run poutine
        uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247 # v1.1.4
        with:
          config: .github/poutine.yml

      - name: Fix and patch poutine SARIF
        if: always()
        run: python3 .github/scripts/fix-poutine-sarif.py

      - name: Upload poutine SARIF to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4.36.0
        if: always()
        with:
          sarif_file: results-fixed.sarif
          category: poutine
