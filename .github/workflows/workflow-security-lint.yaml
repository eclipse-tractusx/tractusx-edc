---
name: "Workflow Security Lint"

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/actions/**'
  schedule:
    - cron: "0 0 * * 1" # every Monday at 00:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zizmor:
    name: "zizmor"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to GitHub Advanced Security
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          version: "1.23.1"
          advanced-security: "true"
          token: ${{ secrets.GITHUB_TOKEN }}
          config: .github/zizmor.yml

  poutine:
    name: "poutine"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # required to upload SARIF to GitHub Advanced Security
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run poutine
        uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247 # v1.1.4
        with:
          config: .github/poutine.yml

      - name: Fix and patch poutine SARIF
        if: always()
        run: python3 .github/scripts/fix-poutine-sarif.py

      - name: Upload poutine SARIF to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e # v4.35.4
        if: always()
        with:
          sarif_file: results-fixed.sarif
          category: poutine
