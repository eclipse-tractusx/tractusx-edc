---
fullnameOverride: tx-inmem
participant:
  id: "test-participant"
  contextId: "test-participant-context"
iatp:
  # Decentralized IDentifier
  id: "did:web:changeme"
  sts:
    dim:
      url: "https://somewhere.dim.org"
    oauth:
      token_url: "https://changeme.org"
      client:
        id: "test-client-id"
        secret_alias: "test-alias"
runtime:
  service:
    type: NodePort
  endpoints:
    management:
      authKey: password
  image:
    pullPolicy: Never
    tag: "latest"
    repository: "edc-runtime-memory"
  securityContext:
    # avoids some errors in the log: cannot write temp files of large multipart requests when R/O
    readOnlyRootFilesystem: false

  # Jetty 12.1.6 compatibility settings
  env:
    EDC_WEB_HTTP_IDLE_TIMEOUT: "60000"
    EDC_WEB_HTTP_THREAD_POOL_MIN: "8"

  # Adjust readiness probe for Jetty 12.1.6
  readinessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 6

  livenessProbe:
    enabled: true
    initialDelaySeconds: 45
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  bdrs:
    server:
      url: "https://bdrs.test.org"
  token:
    signer:
      privatekey_alias: "key-1"
    verifier:
      publickey_alias: "key-1"
tests:
  hookDeletePolicy: before-hook-creation
